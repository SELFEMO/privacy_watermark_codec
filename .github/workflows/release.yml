name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-x64:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: powershell
        run: npm ci

      - name: Refresh bundled FFmpeg manifest
        shell: powershell
        run: npm run ffmpeg:manifest

      - name: Test watermark core
        shell: powershell
        run: cargo test -p watermark-core --release

      - name: Build Windows installer
        shell: powershell
        run: npm run tauri:build

      - name: Upload standardized release packages
        uses: actions/upload-artifact@v4
        with:
          name: privacy-watermark-codec-windows-x64
          path: release/*
          if-no-files-found: error
